<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>Jangid CricScore - Live TV</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,400;0,700;0,900;1,700&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        /* OBS Transparent Background */
        body { margin: 0; padding: 0; font-family: 'Poppins', sans-serif; background: transparent; overflow: hidden; color: white; text-transform: uppercase;}
        
        /* ================= BOTTOM BUG (Main Scoreboard) ================= */
        #bottomBug { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); display: flex; align-items: flex-end; z-index: 100; transition: all 0.5s ease; opacity: 0;}
        .bb-main { display: flex; background: linear-gradient(90deg, #0f172a, #1e293b); border: 2px solid #334155; border-radius: 12px; overflow: hidden; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        
        .bb-team { background: #e11d48; color: white; font-size: 2.2rem; font-weight: 900; padding: 10px 25px; display: flex; align-items: center; justify-content: center; min-width: 100px; text-shadow: 2px 2px 4px rgba(0,0,0,0.5);}
        .bb-score { font-size: 2.8rem; font-weight: 900; padding: 5px 25px; color: #f8fafc; display: flex; align-items: center; justify-content: center; text-shadow: 2px 2px 4px rgba(0,0,0,0.5);}
        .bb-overs { font-size: 1.4rem; color: #94a3b8; padding-right: 20px; display: flex; align-items: center; font-weight: 700;}
        
        .bb-details { background: rgba(15, 23, 42, 0.95); padding: 5px 20px; font-size: 1.1rem; display: flex; flex-direction: column; justify-content: center; border-left: 2px solid #334155; min-width: 350px;}
        .bb-row { display: flex; justify-content: space-between; margin: 2px 0;}
        .striker-text { color: #fbbf24; font-weight: 900; }
        .normal-text { color: #cbd5e1; font-weight: 700; }
        .score-text { font-weight: 900; color: white;}
        
        .bb-extras { background: #38bdf8; color: #0f172a; padding: 5px 20px; font-weight: 900; display: flex; flex-direction: column; justify-content: center; text-align: center; font-size:1.1rem;}
        
        #powerplayTag { background: #f59e0b; color: #000; padding: 2px 10px; border-radius: 4px; font-size: 0.9rem; font-weight: 900; margin-left: 10px; display: none; animation: blink 2s infinite;}
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }

        .this-over-box { position: absolute; bottom: 100%; right: 0; background: rgba(15, 23, 42, 0.9); padding: 5px 15px; border-radius: 8px 8px 0 0; font-size: 1rem; font-weight: bold; color: #cbd5e1; border: 2px solid #334155; border-bottom: none;}
        .ball-circle { display: inline-block; width: 24px; height: 24px; line-height: 24px; text-align: center; border-radius: 50%; background: #334155; color: white; margin-left: 4px; font-size: 0.85rem;}
        .ball-w { background: #e11d48; } .ball-4 { background: #3b82f6; } .ball-6 { background: #8b5cf6; }

        .target-box { position: absolute; bottom: 100%; left: 0; background: #fbbf24; color: #0f172a; padding: 5px 15px; border-radius: 8px 8px 0 0; font-size: 1.1rem; font-weight: 900; display: none;}

        /* ================= POPUP ANIMATIONS (Center Screen) ================= */
        #eventPopup { position: fixed; top: 40%; left: 50%; transform: translate(-50%, -50%) scale(0); font-size: 5rem; font-weight: 900; text-align: center; text-shadow: 4px 4px 10px rgba(0,0,0,0.8); z-index: 999; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); opacity: 0;}
        .event-four { color: #3b82f6; } .event-six { color: #8b5cf6; font-size: 7rem !important; } .event-wicket { color: #e11d48; }
        
        #milestonePopup { position: fixed; bottom: 150px; left: 50%; transform: translateX(-50%) translateY(50px); background: linear-gradient(135deg, #fbbf24, #d97706); color: #000; padding: 15px 40px; border-radius: 12px; font-size: 2.5rem; font-weight: 900; border: 4px solid white; box-shadow: 0 10px 30px rgba(0,0,0,0.6); z-index: 500; opacity: 0; transition: all 0.5s ease; text-align:center;}
        
        /* ================= SIDE/FULL CARDS (Stats, Playing XI, Summary) ================= */
        .graphic-card { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) translateY(50px); background: rgba(15, 23, 42, 0.95); border: 2px solid #38bdf8; border-radius: 12px; padding: 25px; min-width: 500px; box-shadow: 0 15px 40px rgba(0,0,0,0.7); opacity: 0; visibility: hidden; transition: all 0.4s ease; z-index: 200; }
        .graphic-card.active { transform: translate(-50%, -50%) translateY(0); opacity: 1; visibility: visible; }
        
        .card-header { background: linear-gradient(90deg, #0ea5e9, #2563eb); margin: -25px -25px 20px -25px; padding: 15px 25px; border-radius: 10px 10px 0 0; font-size: 1.8rem; font-weight: 900; text-align: center; color: white;}
        .card-table { width: 100%; border-collapse: collapse; font-size: 1.2rem; font-weight: 700;}
        .card-table th, .card-table td { padding: 10px; border-bottom: 1px solid #334155; text-align: center; }
        .card-table th { color: #94a3b8; font-size: 1rem; }
        .card-table td:first-child { text-align: left; color: #f8fafc; }
        
        .highlight-row { background: rgba(56, 189, 248, 0.1); }
        .highlight-text { color: #fbbf24; }

        /* Full Screen (Playing XI / Summary) */
        .full-screen-card { min-width: 800px; background: rgba(15, 23, 42, 0.98); }
        .flex-split { display: flex; gap: 30px; }
        .flex-half { flex: 1; }
        .team-title { background: #e11d48; color: white; text-align: center; padding: 10px; font-size: 1.5rem; font-weight: 900; border-radius: 8px; margin-bottom: 15px;}
        
        /* Points Table specific */
        .pt-group-title { background: #334155; padding: 8px; text-align: center; margin-top: 15px; font-weight: bold; border-radius: 6px; color:#38bdf8;}

    </style>
</head>
<body>

    <div id="eventPopup">WICKET!</div>
    
    <div id="milestonePopup">
        <div id="msTitle" style="font-size:1.5rem; color:#fff; text-shadow:none;">HALF CENTURY</div>
        <div id="msPlayer">VIRAT KOHLI</div>
    </div>

    <div id="statsCard" class="graphic-card">
        <div class="card-header" id="scHeader">TEAM SCORECARD</div>
        <table class="card-table" id="scTable"></table>
    </div>

    <div id="fullScreenCard" class="graphic-card full-screen-card">
        <div class="card-header" id="fsHeader">PLAYING XI</div>
        <div id="fsContent"></div>
    </div>


    <div id="bottomBug">
        <div class="target-box" id="bbTarget">TARGET: 154</div>
        <div class="this-over-box">THIS OVER: <span id="bbThisOver"></span></div>
        
        <div class="bb-main">
            <div class="bb-team" id="bbTeam">IND</div>
            <div class="bb-score"><span id="bbRunsWickets">0-0</span> <span id="powerplayTag">P1</span></div>
            <div class="bb-overs" id="bbOvers">0.0</div>
            
            <div class="bb-details">
                <div class="bb-row">
                    <span class="striker-text" id="bbStrName">Striker *</span>
                    <span class="score-text" id="bbStrScore">0 (0)</span>
                </div>
                <div class="bb-row">
                    <span class="normal-text" id="bbNStrName">Non-Striker</span>
                    <span class="score-text" id="bbNStrScore">0 (0)</span>
                </div>
                <div class="bb-row" style="margin-top: 5px; padding-top: 5px; border-top: 1px solid #334155;">
                    <span class="normal-text" id="bbBwlName">Bowler</span>
                    <span class="score-text" id="bbBwlScore">0-0 (0.0)</span>
                </div>
            </div>
            
            <div class="bb-extras">
                <span style="font-size:0.8rem; color:#0f172a; text-transform:none;">CRR</span>
                <span id="bbCrr">0.00</span>
                <div id="bbRrrBox" style="display:none; margin-top:5px; border-top:1px solid rgba(0,0,0,0.2); padding-top:5px;">
                    <span style="font-size:0.8rem; color:#0f172a; text-transform:none;">REQ</span><br>
                    <span id="bbRrr">0.00</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        // FIREBASE SETUP (Must exactly match app.html)
        const firebaseConfig = { 
            apiKey: "AIzaSyBVDsBQ-yf2Bf3SYn6EGA8TFzf5BwrGBGg", 
            authDomain: "kamal-7775e.firebaseapp.com", 
            databaseURL: "https://kamal-7775e-default-rtdb.firebaseio.com", 
            projectId: "kamal-7775e", 
            storageBucket: "kamal-7775e.firebasestorage.app", 
            messagingSenderId: "58214965866", 
            appId: "1:58214965866:web:de98f07ae696c69ec16013" 
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // Get ID from URL link (e.g. score.html?id=VK-1234)
        const urlParams = new URLSearchParams(window.location.search);
        const clientId = urlParams.get('id') ? urlParams.get('id').toUpperCase() : null;

        if(!clientId) {
            alert("Error: Link mein ID nahi hai! Sahi link kijiye (e.g. ?id=VK-1234)");
        } else {
            console.log("Connected to Client ID:", clientId);
            
            // LISTEN TO FIREBASE COMMANDS
            database.ref('vk_live_action/' + clientId).on('value', (snapshot) => {
                const data = snapshot.val();
                if(data) processCommand(data);
            });
        }

        let clearAnimTimeout;
        let clearMilestoneTimeout;

        // ================= MAIN PROCESSOR =================
        function processCommand(data) {
            console.log("Command Received:", data.type);

            // 1. UPDATE MAIN SCOREBOARD
            if(data.type === 'update' && data.state) {
                updateBottomBug(data.state);
                document.getElementById('bottomBug').style.opacity = 1;
                document.getElementById('bottomBug').style.bottom = "30px";
            }
            
            // 2. SHOW ANIMATIONS (Four, Six, Wicket)
            if(data.type === 'animation') {
                showEventAnimation(data.eventText, data.animType);
            }

            // 3. MILESTONE POPUP
            if(data.type === 'show_milestone') {
                showMilestone(data.text, data.player);
            }

            // 4. HIDE ALL CARDS
            if(data.type === 'hide_all_cards') {
                document.getElementById('statsCard').classList.remove('active');
                document.getElementById('fullScreenCard').classList.remove('active');
            }

            // 5. SHOW SPECIFIC TV GRAPHICS (Cards)
            if(data.type === 'show_bat_card') renderBatCard(data.teamName, data.squad, data.db);
            if(data.type === 'show_bowl_card') renderBowlCard(data.teamName, data.squad, data.db);
            if(data.type === 'show_partnership') renderPartnershipCard(data.state);
            if(data.type === 'show_player_profile') renderOutProfile(data.playerName, data.db);
            
            // 6. SHOW FULL SCREEN WORLD CUP GRAPHICS
            if(data.type === 'show_playing_xi') renderPlayingXI(data.t1, data.t2, data.sq1, data.sq2);
            if(data.type === 'show_match_summary') renderMatchSummary(data.state, data.db);
            if(data.type === 'show_points_table') renderPointsTable(data.tourName, data.groups, data.teams);
        }

        // ================= BOTTOM BUG LOGIC =================
        function updateBottomBug(state) {
            document.getElementById('bbTeam').innerText = state.batTeam;
            document.getElementById('bbRunsWickets').innerText = `${state.runs}-${state.wickets}`;
            document.getElementById('bbOvers').innerText = `${Math.floor(state.balls/6)}.${state.balls%6}`;
            
            // Powerplay logic
            document.getElementById('powerplayTag').style.display = state.isPowerplay ? 'inline-block' : 'none';

            // Target logic (Innings 2)
            if(state.innings === 2 && state.target > 0) {
                document.getElementById('bbTarget').style.display = 'block';
                document.getElementById('bbTarget').innerText = `TARGET: ${state.target}`;
                document.getElementById('bbRrrBox').style.display = 'block';
                document.getElementById('bbRrr').innerText = state.rrr;
            } else {
                document.getElementById('bbTarget').style.display = 'none';
                document.getElementById('bbRrrBox').style.display = 'none';
            }

            document.getElementById('bbCrr').innerText = state.crr;

            // Players logic
            document.getElementById('bbStrName').innerText = state.s_name + " *";
            document.getElementById('bbStrScore').innerText = `${state.s_runs} (${state.s_balls})`;
            document.getElementById('bbNStrName').innerText = state.ns_name;
            document.getElementById('bbNStrScore').innerText = `${state.ns_runs} (${state.ns_balls})`;
            
            document.getElementById('bbBwlName').innerText = state.b_name;
            document.getElementById('bbBwlScore').innerText = `${state.b_wickets}-${state.b_runs} (${Math.floor(state.b_balls/6)}.${state.b_balls%6})`;

            // This Over logic (Balls styling)
            let overHtml = "";
            state.thisOver.forEach(b => {
                let cl = 'ball-circle ';
                if(b === 'W' || b.includes('W')) cl += 'ball-w';
                else if(b === '4') cl += 'ball-4';
                else if(b === '6') cl += 'ball-6';
                overHtml += `<span class="${cl}">${b}</span>`;
            });
            document.getElementById('bbThisOver').innerHTML = overHtml;
        }

        // ================= ANIMATIONS =================
        function showEventAnimation(text, type) {
            let el = document.getElementById('eventPopup');
            el.innerText = text;
            el.className = ''; // reset classes
            if(type === 'four') el.classList.add('event-four');
            if(type === 'six') el.classList.add('event-six');
            if(type === 'wicket') el.classList.add('event-wicket');
            
            el.style.transform = "translate(-50%, -50%) scale(1)";
            el.style.opacity = 1;
            
            clearTimeout(clearAnimTimeout);
            clearAnimTimeout = setTimeout(() => {
                el.style.transform = "translate(-50%, -50%) scale(0)";
                el.style.opacity = 0;
            }, 3000);
        }

        function showMilestone(title, player) {
            let el = document.getElementById('milestonePopup');
            document.getElementById('msTitle').innerText = title;
            document.getElementById('msPlayer').innerText = player;
            
            el.style.opacity = 1;
            el.style.transform = "translateX(-50%) translateY(0)";
            
            clearTimeout(clearMilestoneTimeout);
            clearMilestoneTimeout = setTimeout(() => {
                el.style.opacity = 0;
                el.style.transform = "translateX(-50%) translateY(50px)";
            }, 5000);
        }

        // ================= SIDE CARDS LOGIC =================
        function showCard(cardId) {
            document.getElementById('statsCard').classList.remove('active');
            document.getElementById('fullScreenCard').classList.remove('active');
            setTimeout(() => { document.getElementById(cardId).classList.add('active'); }, 100);
        }

        function renderBatCard(team, squad, db) {
            if(!squad || !db) return;
            document.getElementById('scHeader').innerText = `${team} - BATTING`;
            let html = `<tr><th>BATTER</th><th>R</th><th>B</th><th>4s</th><th>6s</th><th>SR</th></tr>`;
            squad.forEach(p => {
                let d = db[p.name];
                if(d && (d.status === 'batting' || d.status === 'out')) {
                    let sr = d.b > 0 ? ((d.r / d.b) * 100).toFixed(1) : "0.0";
                    let rowClass = d.status === 'batting' ? 'highlight-row highlight-text' : '';
                    let nameDisplay = p.name + (d.status === 'batting' ? ' *' : '');
                    html += `<tr class="${rowClass}"><td><b>${nameDisplay}</b><br><span style="font-size:0.8rem;color:#94a3b8">${d.dismissalInfo||'Batting'}</span></td><td><b>${d.r}</b></td><td>${d.b}</td><td>${d.fours||0}</td><td>${d.sixes||0}</td><td>${sr}</td></tr>`;
                }
            });
            document.getElementById('scTable').innerHTML = html;
            showCard('statsCard');
        }

        function renderBowlCard(team, squad, db) {
            if(!squad || !db) return;
            document.getElementById('scHeader').innerText = `${team} - BOWLING`;
            let html = `<tr><th>BOWLER</th><th>O</th><th>M</th><th>R</th><th>W</th><th>ECO</th></tr>`;
            squad.forEach(p => {
                let d = db[p.name];
                if(d && d.bwB > 0) {
                    let ov = Math.floor(d.bwB / 6) + "." + (d.bwB % 6);
                    let eco = d.bwB > 0 ? (d.bwR / (d.bwB / 6)).toFixed(1) : "0.0";
                    html += `<tr><td><b>${p.name}</b></td><td>${ov}</td><td>0</td><td>${d.bwR}</td><td><b class="highlight-text">${d.bwW}</b></td><td>${eco}</td></tr>`;
                }
            });
            document.getElementById('scTable').innerHTML = html;
            showCard('statsCard');
        }

        function renderPartnershipCard(state) {
            document.getElementById('scHeader').innerText = "CURRENT PARTNERSHIP";
            let html = `
                <tr><td colspan="3" style="text-align:center; font-size:3rem; color:#fbbf24;"><b>${state.partnership.runs}</b> <span style="font-size:1.5rem; color:#cbd5e1;">Runs</span></td></tr>
                <tr><td colspan="3" style="text-align:center; color:#94a3b8;">${state.partnership.balls} Balls</td></tr>
                <tr style="border-top:2px solid #334155;">
                    <td style="text-align:center; font-size:1.5rem;"><b>${state.s_name}</b><br><span style="color:#fbbf24">${state.s_runs}</span><span style="font-size:1rem">(${state.s_balls})</span></td>
                    <td style="text-align:center; color:#94a3b8;">Vs</td>
                    <td style="text-align:center; font-size:1.5rem;"><b>${state.ns_name}</b><br><span style="color:#fbbf24">${state.ns_runs}</span><span style="font-size:1rem">(${state.ns_balls})</span></td>
                </tr>
            `;
            document.getElementById('scTable').innerHTML = html;
            showCard('statsCard');
        }

        function renderOutProfile(name, db) {
            let d = db[name]; if(!d) return;
            let sr = d.b > 0 ? ((d.r / d.b) * 100).toFixed(1) : "0.0";
            document.getElementById('scHeader').innerText = "WICKET";
            let html = `
                <tr><td colspan="4" style="text-align:center; font-size:2rem; color:#e11d48; border-bottom:none;"><b>${name}</b></td></tr>
                <tr><td colspan="4" style="text-align:center; color:#94a3b8;">${d.dismissalInfo}</td></tr>
                <tr style="border-top:2px solid #334155; background: rgba(56, 189, 248, 0.1);">
                    <td style="text-align:center;">RUNS<br><b style="font-size:2rem; color:#f8fafc;">${d.r}</b></td>
                    <td style="text-align:center;">BALLS<br><b style="font-size:1.5rem">${d.b}</b></td>
                    <td style="text-align:center;">4s/6s<br><b style="font-size:1.5rem">${d.fours||0}/${d.sixes||0}</b></td>
                    <td style="text-align:center;">SR<br><b style="font-size:1.5rem">${sr}</b></td>
                </tr>
            `;
            document.getElementById('scTable').innerHTML = html;
            showCard('statsCard');
        }

        // ================= FULL SCREEN WORLD CUP GRAPHICS =================

        function renderPlayingXI(t1, t2, sq1, sq2) {
            document.getElementById('fsHeader').innerText = "PLAYING XI";
            let html = `<div class="flex-split">`;
            
            // Team 1
            html += `<div class="flex-half"><div class="team-title" style="background:#0284c7;">${t1}</div><table class="card-table">`;
            sq1.forEach((p,i) => { let tag = p.isC ? " (C)" : (p.isVC ? " (VC)" : ""); html += `<tr><td style="text-align:center;">${p.name} <span style="color:#fbbf24; font-size:0.8rem;">${tag}</span></td></tr>`; });
            html += `</table></div>`;

            // Team 2
            html += `<div class="flex-half"><div class="team-title" style="background:#ea580c;">${t2}</div><table class="card-table">`;
            sq2.forEach((p,i) => { let tag = p.isC ? " (C)" : (p.isVC ? " (VC)" : ""); html += `<tr><td style="text-align:center;">${p.name} <span style="color:#fbbf24; font-size:0.8rem;">${tag}</span></td></tr>`; });
            html += `</table></div></div>`;
            
            document.getElementById('fsContent').innerHTML = html;
            showCard('fullScreenCard');
        }

        function renderMatchSummary(state, db) {
            document.getElementById('fsHeader').innerText = "INNINGS SUMMARY";
            
            // Find top scorers
            let batters = []; let bowlers = [];
            for(let p in db) {
                if(db[p].r > 0 || db[p].b > 0) batters.push({name: p, r: db[p].r, b: db[p].b});
                if(db[p].bwB > 0) bowlers.push({name: p, w: db[p].bwW, r: db[p].bwR, ov: Math.floor(db[p].bwB/6)+"."+(db[p].bwB%6)});
            }
            batters.sort((a,b) => b.r - a.r); bowlers.sort((a,b) => b.w - a.w || a.r - b.r);
            
            let html = `<div style="text-align:center; font-size:3rem; font-weight:900; color:#fbbf24; margin-bottom:20px;">${state.batTeam} : ${state.runs}-${state.wickets} <span style="font-size:1.5rem; color:#94a3b8;">(${Math.floor(state.balls/6)}.${state.balls%6} Ov)</span></div>`;
            
            html += `<div class="flex-split">`;
            // Top Batters
            html += `<div class="flex-half"><div class="team-title" style="background:#334155;">TOP BATTERS</div><table class="card-table">`;
            batters.slice(0,3).forEach(b => { html += `<tr><td>${b.name}</td><td><b>${b.r}</b> (${b.b})</td></tr>`; });
            html += `</table></div>`;

            // Top Bowlers
            html += `<div class="flex-half"><div class="team-title" style="background:#334155;">TOP BOWLERS</div><table class="card-table">`;
            bowlers.slice(0,3).forEach(b => { html += `<tr><td>${b.name}</td><td><b>${b.w}</b>/${b.r} <span style="font-size:0.8rem; color:#94a3b8;">(${b.ov})</span></td></tr>`; });
            html += `</table></div></div>`;

            document.getElementById('fsContent').innerHTML = html;
            showCard('fullScreenCard');
        }

        function renderPointsTable(tourName, groups, teams) {
            document.getElementById('fsHeader').innerText = `${tourName} - POINTS TABLE`;
            let html = `<div class="flex-split">`;
            
            groups.forEach(g => {
                let tGrp = Object.keys(teams).filter(t => teams[t].group === g && !teams[t].eliminated);
                tGrp.sort((a,b) => teams[b].stats.pts - teams[a].stats.pts);
                
                if(tGrp.length > 0) {
                    html += `<div class="flex-half"><div class="pt-group-title">${g}</div><table class="card-table" style="font-size:1rem;"><tr><th>TEAM</th><th>M</th><th>W</th><th>L</th><th>PTS</th></tr>`;
                    tGrp.forEach((tName, idx) => {
                        let tm = teams[tName];
                        let highlight = idx < 2 ? 'color:#fbbf24;' : ''; // Highlight top 2
                        html += `<tr><td style="${highlight} font-weight:bold;">${tName}</td><td>${tm.stats.m}</td><td>${tm.stats.w}</td><td>${tm.stats.l}</td><td style="${highlight} font-weight:900; font-size:1.2rem;">${tm.stats.pts}</td></tr>`;
                    });
                    html += `</table></div>`;
                }
            });
            html += `</div>`;
            document.getElementById('fsContent').innerHTML = html;
            showCard('fullScreenCard');
        }

    </script>
</body>
