<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>एडमिन पैनल</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; text-align: center; padding: 20px; }
        .box { background: white; max-width: 600px; margin: 0 auto; padding: 20px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .msg-card { background: #fff; padding: 15px; margin: 10px 0; border-left: 5px solid #d4af37; text-align: left; border: 1px solid #ddd; }
        button { background: red; color: white; border: none; padding: 5px 10px; cursor: pointer; border-radius: 5px; float: right; }
        #login { margin-top: 100px; }
        #dash { display: none; }
    </style>
</head>
<body>

    <div id="login" class="box">
        <h2>एडमिन लॉगिन</h2>
        <input type="password" id="pass" placeholder="पासवर्ड (praveen2026)" style="padding:10px; width:80%;">
        <br><br>
        <button onclick="checkPass()" style="background:#122b4b; float:none; padding:10px 20px;">लॉगिन</button>
    </div>

    <div id="dash" class="box">
        <h2 style="color:#122b4b;">संदेश कंट्रोल रूम</h2>
        <p>यहाँ से आप फालतू मैसेज डिलीट कर सकते हैं।</p>
        <hr>
        <div id="msg-list">लोड हो रहा है...</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, onValue, remove } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBA_kb7jChlz_CeUapULv_-f5I8TIHoLBM",
            authDomain: "scorecardplay-432bd.firebaseapp.com",
            databaseURL: "https://scorecardplay-432bd-default-rtdb.firebaseio.com",
            projectId: "scorecardplay-432bd"
        };

        const db = getDatabase(initializeApp(firebaseConfig));
        
        onValue(ref(db, 'wedding_wishes'), (snapshot) => {
            const list = document.getElementById('msg-list');
            list.innerHTML = '';
            const data = snapshot.val();
            
            if(data) {
                Object.keys(data).map(k => ({id: k, ...data[k]})).reverse().forEach(w => {
                    list.innerHTML += `<div class="msg-card">
                        <b>👤 ${w.name}</b><br>
                        <span style="color:#666;">${w.message}</span>
                        <button onclick="deleteMsg('${w.id}')">डिलीट</button>
                    </div><div style="clear:both;"></div>`;
                });
            } else { list.innerHTML = 'कोई संदेश नहीं है।'; }
        });

        window.deleteMsg = function(id) {
            if(confirm("डिलीट करें?")) remove(ref(db, 'wedding_wishes/' + id));
        };
    </script>

    <script>
        function checkPass() {
            if(document.getElementById('pass').value === 'praveen2026') {
                document.getElementById('login').style.display = 'none';
                document.getElementById('dash').style.display = 'block';
            } else alert('गलत पासवर्ड!');
        }
    </script>
</body>
</html>
