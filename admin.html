<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>Jangid CricScore - Super Admin</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        body { font-family: Arial, sans-serif; background: #0f172a; color: white; margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; background: #1e293b; padding: 20px; border-radius: 12px; border: 2px solid #38bdf8; }
        h1 { text-align: center; color: #38bdf8; border-bottom: 1px solid #334155; padding-bottom: 10px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        label { font-weight: bold; color: #cbd5e1; display: block; margin-bottom: 5px; }
        input, select { width: 100%; padding: 10px; border-radius: 6px; border: 1px solid #475569; background: #0f172a; color: white; box-sizing: border-box; font-size: 1rem; }
        button { background: #38bdf8; color: #0f172a; padding: 12px; border: none; border-radius: 6px; font-weight: bold; font-size: 1.1rem; width: 100%; cursor: pointer; transition: 0.2s; }
        button:hover { background: #0ea5e9; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: #0f172a; }
        th, td { padding: 10px; border: 1px solid #334155; text-align: center; }
        th { background: #334155; color: #38bdf8; }
        .status-active { color: #4ade80; font-weight: bold; }
        .status-expired { color: #f87171; font-weight: bold; }
        .btn-delete { background: #ef4444; color: white; padding: 5px 10px; width: auto; font-size: 0.9rem; }
    </style>
</head>
<body>

    <div id="authScreen" style="text-align:center; margin-top:100px;">
        <h2>Enter Admin Password</h2>
        <input type="password" id="adminPass" style="max-width:300px; margin-bottom:15px; text-align:center;">
        <br>
        <button onclick="checkAdmin()" style="max-width:300px;">Login</button>
    </div>

    <div id="adminPanel" class="container" style="display:none;">
        <h1>🛡️ Super Admin Control</h1>
        
        <div style="background:#0f172a; padding:20px; border-radius:8px; border:1px solid #334155;">
            <h3 style="margin-top:0; color:#fbbf24;">नई Client ID बनाएं</h3>
            <div class="grid">
                <div>
                    <label>Client ID (Custom Name)</label>
                    <input type="text" id="newClientId" placeholder="उदा: VK-101" style="text-transform:uppercase;">
                </div>
                <div>
                    <label>प्लान का प्रकार (Plan Type)</label>
                    <select id="newClientPlan">
                        <option value="single">🏏 Single Match (सिर्फ 1 मैच के लिए)</option>
                        <option value="pro">🏆 Tournament Pro (पॉइंट्स टेबल के साथ)</option>
                    </select>
                </div>
                <div>
                    <label>वैलिडिटी (Validity)</label>
                    <select id="newClientValidity">
                        <option value="1">1 दिन (24 Hours)</option>
                        <option value="7">7 दिन (1 Week)</option>
                        <option value="30">30 दिन (1 Month)</option>
                    </select>
                </div>
                <div style="display:flex; align-items:flex-end;">
                    <button onclick="generateID()">➕ ID Generate करें</button>
                </div>
            </div>
        </div>

        <h3 style="margin-top:30px; border-top:1px solid #334155; padding-top:20px;">📋 सभी एक्टिव/एक्सपायर IDs की लिस्ट</h3>
        <table>
            <thead>
                <tr>
                    <th>Client ID</th>
                    <th>Plan Type</th>
                    <th>Expiry Date</th>
                    <th>Status</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="clientTableBody">
                </tbody>
        </table>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyBVDsBQ-yf2Bf3SYn6EGA8TFzf5BwrGBGg", authDomain: "kamal-7775e.firebaseapp.com", databaseURL: "https://kamal-7775e-default-rtdb.firebaseio.com", projectId: "kamal-7775e", storageBucket: "kamal-7775e.firebasestorage.app", messagingSenderId: "58214965866", appId: "1:58214965866:web:de98f07ae696c69ec16013" };
        firebase.initializeApp(firebaseConfig); const database = firebase.database();

        // Simple Security (You can change "admin123" to any password you want)
        function checkAdmin() {
            if(document.getElementById('adminPass').value === "admin123") {
                document.getElementById('authScreen').style.display = "none";
                document.getElementById('adminPanel').style.display = "block";
                loadClients();
            } else {
                alert("❌ गलत पासवर्ड!");
            }
        }

        function generateID() {
            let id = document.getElementById('newClientId').value.trim().toUpperCase();
            let plan = document.getElementById('newClientPlan').value;
            let days = parseInt(document.getElementById('newClientValidity').value);
            
            if(!id) return alert("ID का नाम लिखें!");
            
            let expiry = Date.now() + (days * 24 * 60 * 60 * 1000); // Calculate Expiry in milliseconds
            
            database.ref('vk_clients/' + id).set({
                active: true,
                planType: plan,
                expiryTime: expiry,
                createdOn: Date.now()
            }).then(() => {
                alert(`✅ ID (${id}) सफलतापूर्वक बन गई है!\nप्लान: ${plan}`);
                document.getElementById('newClientId').value = "";
                loadClients();
            });
        }

        function loadClients() {
            database.ref('vk_clients').on('value', (snapshot) => {
                let data = snapshot.val();
                let tbody = document.getElementById('clientTableBody');
                tbody.innerHTML = "";
                
                if(data) {
                    for(let id in data) {
                        let client = data[id];
                        let planText = client.planType === 'pro' ? '🏆 Pro' : '🏏 Single';
                        let expDate = new Date(client.expiryTime).toLocaleString('hi-IN');
                        let isExpired = Date.now() > client.expiryTime;
                        let statusText = isExpired ? '<span class="status-expired">Expired</span>' : '<span class="status-active">Active</span>';
                        
                        tbody.innerHTML += `
                            <tr>
                                <td><b>${id}</b></td>
                                <td>${planText}</td>
                                <td>${expDate}</td>
                                <td>${statusText}</td>
                                <td><button class="btn-delete" onclick="deleteID('${id}')">Delete 🗑️</button></td>
                            </tr>
                        `;
                    }
                } else {
                    tbody.innerHTML = "<tr><td colspan='5'>कोई ID मौजूद नहीं है।</td></tr>";
                }
            });
        }

        function deleteID(id) {
            if(confirm(`क्या आप सच में ${id} को डिलीट करना चाहते हैं?`)) {
                database.ref('vk_clients/' + id).remove();
            }
        }
    </script>
</body>
</html>
